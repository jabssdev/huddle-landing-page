<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />

		<!-- SEO Meta Tags -->
		<title>Huddle | Build The Community Your Fans Will Love</title>
		<meta name="description" content="Huddle re-imagines the way we build communities. Create connections with your users as you engage in genuine discussion." />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://jabssdev.github.io/huddle-landing-page/" />
		<meta property="og:title" content="Huddle | Build The Community Your Fans Will Love" />
		<meta property="og:description" content="Huddle re-imagines the way we build communities. Create connections with your users as you engage in genuine discussion." />
		<meta property="og:image" content="./images/desktop-preview.jpg" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://jabssdev.github.io/huddle-landing-page/" />
		<meta property="twitter:title" content="Huddle | Build The Community Your Fans Will Love" />
		<meta property="twitter:description" content="Huddle re-imagines the way we build communities. Create connections with your users as you engage in genuine discussion." />
		<meta property="twitter:image" content="./images/desktop-preview.jpg" />

		<!-- CSS Stylesheets -->
		<link rel="stylesheet" href="styles.css" />

		<!-- Font Awesome for Social Icons -->
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
			integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
	</head>
	<body>
		<div class="page-wrapper">
			<header class="header">
				<div class="container">
					<a href="/" aria-label="Huddle Home">
						<img src="./images/logo.svg" alt="Huddle Logo" class="logo" />
					</a>
				</div>
			</header>

			<main class="main-content container">
				<div class="hero">
					<div class="hero-illustration">
						<img src="./images/illustration-mockups.svg" alt="Mockups of Huddle interface on desktop and mobile" class="illustration" />
					</div>

					<section class="hero-text-content">
						<h1>Build The Community Your Fans Will Love</h1>
						<p>Huddle re-imagines the way we build communities. You have a voice, but so does your audience. Create connections with your users as you engage in genuine discussion.</p>
						<button class="btn-register" type="button">Register</button>
					</section>
				</div>
			</main>

			<footer class="footer container">
				<ul class="social-links" role="list">
					<li>
						<a href="#" aria-label="Follow us on Facebook">
							<i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
						</a>
					</li>
					<li>
						<a href="#" aria-label="Follow us on Twitter">
							<i class="fa-brands fa-twitter" aria-hidden="true"></i>
						</a>
					</li>
					<li>
						<a href="#" aria-label="Follow us on Instagram">
							<i class="fa-brands fa-instagram" aria-hidden="true"></i>
						</a>
					</li>
				</ul>

				<p class="attribution">
					Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>. Coded by
					<a href="https://github.com/jabssdev" target="_blank" rel="noopener noreferrer">JabssDev</a>.
				</p>
			</footer>
		</div>
	</body>
</html>
